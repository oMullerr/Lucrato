<div class="verify-page">
  <mat-card class="verify-card">
    <div class="icon-wrap">
      <mat-icon>mark_email_unread</mat-icon>
    </div>

    <h1>{{ 'auth.verifyTitle' | translate }}</h1>
    <p class="lead">
      {{ 'auth.verifyLeadBefore' | translate }}
      <strong>{{ email() || ('auth.emailFallback' | translate) }}</strong>{{ 'auth.verifyLeadAfter' | translate }}
    </p>

    <div class="hint">
      <mat-icon>info</mat-icon>
      <span>{{ 'auth.verifyHint' | translate }}</span>
    </div>

    <div class="actions">
      <button
        mat-flat-button
        color="primary"
        (click)="checkAgain()"
        [disabled]="checking()"
      >
        @if (checking()) {
          <mat-spinner diameter="18" />
        } @else {
          <mat-icon>refresh</mat-icon>
        }
        {{ 'auth.alreadyVerified' | translate }}
      </button>

      <button
        mat-stroked-button
        (click)="resend()"
        [disabled]="resending() || cooldown() > 0"
      >
        <mat-icon>send</mat-icon>
        @if (cooldown() > 0) {
          {{ 'auth.resendIn' | translate:{ s: cooldown() } }}
        } @else {
          {{ (resending() ? 'auth.sending' : 'auth.resendEmail') | translate }}
        }
      </button>
    </div>

    <button mat-button class="logout-link" (click)="logout()">
      {{ 'auth.logoutOther' | translate }}
    </button>
  </mat-card>
</div>
