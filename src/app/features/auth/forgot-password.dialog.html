<h2 mat-dialog-title>
  <mat-icon>lock_reset</mat-icon>
  {{ 'auth.forgotTitle' | translate }}
</h2>
<mat-dialog-content>
  <p>
    {{ 'auth.forgotIntro' | translate }}
  </p>

  @if (sent()) {
    <div class="info-msg">
      <mat-icon>mark_email_read</mat-icon>
      {{ 'auth.forgotSent' | translate }}
    </div>
  } @else {
    <mat-form-field appearance="outline" class="email-field">
      <mat-label>{{ 'auth.email' | translate }}</mat-label>
      <input
        matInput
        type="email"
        [ngModel]="email()"
        (ngModelChange)="email.set($event)"
        autocomplete="email"
        cdkFocusInitial
      />
    </mat-form-field>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  @if (sent()) {
    <button mat-flat-button color="primary" (click)="ref.close()">
      {{ 'common.close' | translate }}
    </button>
  } @else {
    <button mat-button (click)="ref.close()" [disabled]="loading()">
      {{ 'common.cancel' | translate }}
    </button>
    <button
      mat-flat-button
      color="primary"
      (click)="submit()"
      [disabled]="!canSubmit() || loading()"
    >
      @if (loading()) {
        <mat-spinner diameter="18" />
      } @else {
        {{ 'auth.sendLink' | translate }}
      }
    </button>
  }
</mat-dialog-actions>
