@if (items().length) {
  <ul class="item-list">
    @for (item of items(); track item; let i = $index, first = $first, last = $last) {
      <li class="item-row">
        @if (withColor()) {
          <input
            type="color"
            class="color-swatch"
            [value]="colorOf(item)"
            (input)="setColor(item, $any($event.target).value)"
            [attr.aria-label]="'editableList.colorOf' | translate:{ item: item }"
          />
        }
        <span class="item-name">{{ item }}</span>
        <div class="item-actions">
          <button
            mat-icon-button
            type="button"
            class="reorder-btn"
            (click)="move(i, -1)"
            [disabled]="first"
            [attr.aria-label]="'editableList.moveUp' | translate"
          >
            <mat-icon>keyboard_arrow_up</mat-icon>
          </button>
          <button
            mat-icon-button
            type="button"
            class="reorder-btn"
            (click)="move(i, 1)"
            [disabled]="last"
            [attr.aria-label]="'editableList.moveDown' | translate"
          >
            <mat-icon>keyboard_arrow_down</mat-icon>
          </button>
          <button
            mat-icon-button
            type="button"
            class="remove-btn"
            (click)="remove(i)"
            [attr.aria-label]="'common.remove' | translate"
          >
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </li>
    }
  </ul>
} @else {
  <p class="empty-hint">{{ 'editableList.noItems' | translate }}</p>
}

<div class="add-row">
  @if (withColor()) {
    <input
      type="color"
      class="color-swatch add-swatch"
      [(ngModel)]="draftColor"
      [attr.aria-label]="'editableList.newColor' | translate"
    />
  }
  <mat-form-field appearance="outline" class="add-field">
    <mat-label>{{ addLabel() }}</mat-label>
    <input
      matInput
      [(ngModel)]="draft"
      [placeholder]="placeholder() || ('editableList.placeholder' | translate)"
      (keydown.enter)="$event.preventDefault(); add()"
    />
    <button matSuffix mat-icon-button type="button" (click)="add()" [attr.aria-label]="'common.add' | translate">
      <mat-icon>add</mat-icon>
    </button>
  </mat-form-field>
</div>
