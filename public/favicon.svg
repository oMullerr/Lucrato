<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Lucrato">
  <!-- Phthalo deep teal background -->
  <rect width="64" height="64" rx="14" fill="#0A6E5C"/>

  <!-- Bold geometric "L" in champagne -->
  <path d="M 21 14 L 21 46 L 46 46"
        fill="none"
        stroke="#E8C77B"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Champagne accent dot (premium product mark) -->
  <circle cx="48" cy="18" r="3.5" fill="#E8C77B"/>
</svg>
