<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Interior (open top - dark) -->
  <polygon points="14,52 74,52 88,42 28,42"
           fill="#8B500F" stroke="#1A0904" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Left lid flap -->
  <polygon points="14,52 28,42 22,17 8,26"
           fill="#F5C27A" stroke="#1A0904" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Right lid flap -->
  <polygon points="74,52 88,42 88,15 70,24"
           fill="#E0A04C" stroke="#1A0904" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Box front face -->
  <polygon points="14,52 74,52 74,90 14,90"
           fill="#F5C27A" stroke="#1A0904" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Box right side (3D depth) -->
  <polygon points="74,52 88,42 88,80 74,90"
           fill="#E0A04C" stroke="#1A0904" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Center fold line (front face) -->
  <line x1="44" y1="52" x2="44" y2="90"
        stroke="#1A0904" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.28"/>
</svg>
